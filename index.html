<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flashcards — Bac de Français</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.barre {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px;
  background: #fff;
  border-bottom: 1px solid #ccc;
  align-items: center;
}
.barre select, .barre button {
  font-size: 15px;
  padding: 6px 10px;
  border: 1px solid #aaa;
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
}
.barre button.actif { background: #ddeeff; }
.compteur {
  text-align: center;
  padding: 6px;
  font-size: 14px;
  color: #555;
}
.carte {
  flex: 1;
  margin: 8px 12px;
  background: #fff;
  border: 2px solid #bbb;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  cursor: pointer;
  overflow-y: auto;
}
.carte.revelee { background: #f0f0ff; border-color: #88a; }
.carte-texte {
  font-size: 18px;
  text-align: center;
  line-height: 1.5;
  max-width: 100%;
}
.carte-texte .petit { font-size: 14px; color: #666; margin-top: 10px; }
.nav {
  display: flex;
  gap: 8px;
  padding: 8px 12px 12px;
  justify-content: center;
}
.nav button {
  font-size: 16px;
  padding: 10px 18px;
  border: 1px solid #aaa;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  flex: 1;
  max-width: 160px;
}
.nav button:active { background: #eee; }
</style>
</head>
<body>

<div class="barre">
  <select id="filtre">
    <option value="Tout">Tout</option>
    <option value="Figures de style">Figures de style</option>
    <option value="Registres">Registres</option>
    <option value="Mouvements">Mouvements</option>
    <option value="Versification">Versification</option>
    <option value="Formes poétiques">Formes poétiques</option>
    <option value="Sonorités">Sonorités</option>
    <option value="Lexique d'analyse">Lexique d'analyse</option>
    <option value="Nomenclature">Nomenclature</option>
  </select>
  <button id="btnMode">Mode : Normal</button>
</div>

<div class="compteur" id="compteur"></div>

<div class="carte" id="carte">
  <div class="carte-texte" id="carteTxt"></div>
</div>

<div class="nav">
  <button id="btnPrec">⏮ Préc.</button>
  <button id="btnMel">🔀 Mélanger</button>
  <button id="btnSuiv">Suiv. ⏭</button>
</div>

<script>
var CARTES = [
  // === FIGURES DE STYLE ===
  {nom:"Comparaison", definition:"Rapprochement via un outil de comparaison (comme, tel, ainsi que…).", exemple:"« Il est fort comme un lion. »", categorie:"Figures de style"},
  {nom:"Métaphore", definition:"Comparaison sans outil, image implicite entre deux éléments.", exemple:"« Cet homme est un lion. »", categorie:"Figures de style"},
  {nom:"Personnification", definition:"Attribuer des caractéristiques humaines à un objet, animal ou idée abstraite.", exemple:"« La mer murmurait doucement. »", categorie:"Figures de style"},
  {nom:"Allégorie", definition:"Représentation concrète et imagée d'une idée abstraite, souvent prolongée.", exemple:"La Justice = femme aux yeux bandés tenant une balance.", categorie:"Figures de style"},
  {nom:"Antithèse", definition:"Opposition de deux termes ou idées contraires dans une même phrase.", exemple:"« Je vis, je meurs ; je me brûle et me noie. » (Labé)", categorie:"Figures de style"},
  {nom:"Oxymore", definition:"Alliance de deux mots de sens contraire dans un même groupe syntaxique.", exemple:"« Cette obscure clarté qui tombe des étoiles » (Corneille)", categorie:"Figures de style"},
  {nom:"Chiasme", definition:"Structure croisée AB/BA qui met en valeur une symétrie ou une opposition.", exemple:"« Il faut manger pour vivre, et non vivre pour manger. » (Molière)", categorie:"Figures de style"},
  {nom:"Antiphrase / Ironie", definition:"Dire le contraire de ce que l'on pense, dans une intention moqueuse.", exemple:"« Quel beau temps ! » (sous la pluie)", categorie:"Figures de style"},
  {nom:"Hyperbole", definition:"Exagération dans les termes utilisés pour frapper l'imagination.", exemple:"« Je meurs de faim. »", categorie:"Figures de style"},
  {nom:"Euphémisme", definition:"Atténuation d'une réalité désagréable par une expression adoucie.", exemple:"« Il nous a quittés » = il est mort.", categorie:"Figures de style"},
  {nom:"Litote", definition:"Dire moins pour suggérer davantage. On affirme en niant le contraire.", exemple:"« Va, je ne te hais point. » = je t'aime (Corneille)", categorie:"Figures de style"},
  {nom:"Gradation", definition:"Succession de termes d'intensité croissante ou décroissante.", exemple:"« Je le vis, je rougis, je pâlis à sa vue. » (Racine)", categorie:"Figures de style"},
  {nom:"Anaphore", definition:"Répétition d'un même mot ou groupe en début de vers, phrase ou proposition.", exemple:"« Moi président… Moi président… »", categorie:"Figures de style"},
  {nom:"Énumération / Accumulation", definition:"Liste de termes de même nature créant un effet d'abondance ou d'insistance.", exemple:"« Des bateaux, des maisons, des ponts, des rues. »", categorie:"Figures de style"},
  {nom:"Métonymie", definition:"Remplacement d'un mot par un autre lié logiquement (contenant/contenu, cause/effet…).", exemple:"« Boire un verre » = le contenant pour le contenu.", categorie:"Figures de style"},
  {nom:"Synecdoque", definition:"Désigner le tout par la partie ou la partie par le tout.", exemple:"« Les voiles au loin » = les bateaux.", categorie:"Figures de style"},
  {nom:"Périphrase", definition:"Remplacer un mot par une expression plus longue qui le décrit.", exemple:"« La Ville Lumière » = Paris.", categorie:"Figures de style"},
  {nom:"Métaphore filée", definition:"Métaphore développée sur plusieurs vers ou phrases, formant un réseau d'images cohérent.", exemple:"Le champ lexical maritime chez Hugo pour évoquer le destin.", categorie:"Figures de style"},
  {nom:"Parallélisme", definition:"Répétition d'une même structure syntaxique pour créer un effet de symétrie.", exemple:"« Je n'ai plus que les os… Je n'ai plus que les os… » (Ronsard)", categorie:"Figures de style"},

  // === REGISTRES ===
  {nom:"Registre tragique", definition:"Fatalité, mort, impuissance face au destin. Procédés : champ lexical de la mort, exclamations, dilemme.", exemple:"Racine (Phèdre), Corneille.", categorie:"Registres"},
  {nom:"Registre comique", definition:"Faire rire. Procédés : jeux de mots, quiproquos, répétitions, exagérations.", exemple:"Molière (Le Malade imaginaire, Les Fourberies de Scapin).", categorie:"Registres"},
  {nom:"Registre lyrique", definition:"Expression des sentiments personnels. Procédés : 1ʳᵉ personne, exclamations, métaphores, musicalité.", exemple:"Lamartine (« Le Lac »), Musset.", categorie:"Registres"},
  {nom:"Registre pathétique", definition:"Susciter pitié et compassion. Procédés : champ lexical de la souffrance, hyperboles, interjections.", exemple:"Hugo (Les Misérables), Zola (Germinal).", categorie:"Registres"},
  {nom:"Registre épique", definition:"Glorifier des exploits héroïques. Procédés : hyperboles, énumérations, comparaisons grandioses.", exemple:"Hugo (« Les Châtiments »).", categorie:"Registres"},
  {nom:"Registre fantastique", definition:"Créer le doute entre réel et surnaturel. Procédés : champ lexical de l'étrange, modalisateurs.", exemple:"Maupassant (« Le Horla »), Hoffmann.", categorie:"Registres"},
  {nom:"Registre polémique", definition:"Critiquer, dénoncer avec véhémence. Procédés : ironie, antiphrases, vocabulaire dépréciatif.", exemple:"Voltaire (Traité sur la tolérance), Zola (« J'accuse »).", categorie:"Registres"},
  {nom:"Registre didactique", definition:"Instruire, transmettre un savoir. Procédés : présent de vérité générale, vocabulaire technique, exemples.", exemple:"La Fontaine (Fables), Montaigne (Essais), encyclopédistes.", categorie:"Registres"},
  {nom:"Registre satirique", definition:"Se moquer pour critiquer. Procédés : ironie, caricature, exagération.", exemple:"La Fontaine, Voltaire (Candide), Molière (Tartuffe).", categorie:"Registres"},
  {nom:"Registre élégiaque", definition:"Plainte mélancolique liée à la perte, au deuil, à la fuite du temps.", exemple:"", categorie:"Registres"},

  // === MOUVEMENTS ===
  {nom:"Humanisme", siecle:"XVIe siècle", definition:"Confiance en l'homme, soif de savoir, retour aux textes antiques, éducation.", exemple:"Rabelais, Montaigne.", categorie:"Mouvements"},
  {nom:"La Pléiade", siecle:"XVIe siècle", definition:"Enrichir la langue française, imiter les Anciens, élever la poésie.", exemple:"Ronsard, Du Bellay.", categorie:"Mouvements"},
  {nom:"Baroque", siecle:"Fin XVIe – déb. XVIIe", definition:"Instabilité, illusion, mouvement, profusion ornementale, thème de la vanité.", exemple:"D'Aubigné, Saint-Amant.", categorie:"Mouvements"},
  {nom:"Classicisme", siecle:"XVIIe siècle", definition:"Ordre, mesure, clarté, imitation des Anciens, règle des trois unités, vraisemblance.", exemple:"Molière, Racine, La Fontaine, Boileau.", categorie:"Mouvements"},
  {nom:"Les Lumières", siecle:"XVIIIe siècle", definition:"Raison, progrès, tolérance, critique de l'absolutisme et des préjugés.", exemple:"Voltaire, Diderot, Rousseau, Montesquieu.", categorie:"Mouvements"},
  {nom:"Romantisme", siecle:"1ʳᵉ moitié du XIXe", definition:"Exaltation du moi, sentiment de la nature, mélancolie, liberté créatrice.", exemple:"Hugo, Musset, Lamartine, Chateaubriand.", categorie:"Mouvements"},
  {nom:"Réalisme", siecle:"Milieu du XIXe", definition:"Représentation fidèle de la réalité sociale, observation minutieuse.", exemple:"Balzac, Flaubert, Stendhal.", categorie:"Mouvements"},
  {nom:"Naturalisme", siecle:"Fin du XIXe", definition:"Prolongement du réalisme avec démarche scientifique (hérédité, milieu).", exemple:"Zola (Les Rougon-Macquart), Maupassant.", categorie:"Mouvements"},
  {nom:"Symbolisme", siecle:"Fin du XIXe", definition:"Suggestion plutôt que description, musicalité, symboles, monde intérieur.", exemple:"Baudelaire, Verlaine, Rimbaud, Mallarmé.", categorie:"Mouvements"},
  {nom:"Surréalisme", siecle:"XXe siècle (dès 1924)", definition:"Écriture automatique, exploration de l'inconscient, rejet de la logique rationnelle.", exemple:"Breton, Éluard, Aragon, Desnos.", categorie:"Mouvements"},
  {nom:"Existentialisme", siecle:"XXe siècle (1940–1960)", definition:"L'existence précède l'essence, liberté, responsabilité, absurde.", exemple:"Sartre, Camus, Beauvoir.", categorie:"Mouvements"},
  {nom:"Nouveau Roman", siecle:"Milieu du XXe", definition:"Rejet du roman traditionnel, expérimentation formelle, remise en question de la narration.", exemple:"Robbe-Grillet, Sarraute, Butor, Duras.", categorie:"Mouvements"},

  // === VERSIFICATION ===
  // Types de vers
  {nom:"Alexandrin", definition:"Vers de 12 syllabes, le plus noble de la poésie classique.", exemple:"« Je suis le ténébreux, le veuf, l'inconsolé » (Nerval)", categorie:"Versification"},
  {nom:"Décasyllabe", definition:"Vers de 10 syllabes, fréquent au Moyen Âge et chez les symbolistes.", exemple:"Villon, Verlaine.", categorie:"Versification"},
  {nom:"Octosyllabe", definition:"Vers de 8 syllabes, rythme léger et musical.", exemple:"Fréquent dans les fables et chansons.", categorie:"Versification"},
  {nom:"Vers libre", definition:"Vers de longueur variable, sans mètre régulier. Fin XIXe siècle.", exemple:"Rimbaud, Apollinaire, Char.", categorie:"Versification"},
  {nom:"Vers impair", definition:"Vers de 5, 7, 9 ou 11 syllabes. Privilégié par Verlaine.", exemple:"« De la musique avant toute chose » (Verlaine)", categorie:"Versification"},
  // Décompte des syllabes
  {nom:"Diérèse", definition:"Prononciation en deux syllabes d'une voyelle habituellement groupée en une seule. Met en relief le mot.", exemple:"li-on au lieu de lion.", categorie:"Versification"},
  {nom:"Synérèse", definition:"Prononciation en une seule syllabe de deux voyelles habituellement séparées. Accélère le rythme.", exemple:"lion en une syllabe.", categorie:"Versification"},
  {nom:"E muet / e caduc", definition:"Le e se prononce devant une consonne, s'élide devant une voyelle ou un h muet, ne se compte pas en fin de vers.", exemple:"", categorie:"Versification"},
  // Rimes
  {nom:"Rime pauvre", definition:"Un seul phonème en commun.", exemple:"vie / amie.", categorie:"Versification"},
  {nom:"Rime suffisante", definition:"Deux phonèmes en commun.", exemple:"automne / colonne.", categorie:"Versification"},
  {nom:"Rime riche", definition:"Trois phonèmes ou plus en commun.", exemple:"tendresse / paresse.", categorie:"Versification"},
  {nom:"Rimes plates (suivies)", definition:"Schéma de rimes AABB.", exemple:"", categorie:"Versification"},
  {nom:"Rimes croisées", definition:"Schéma de rimes ABAB.", exemple:"", categorie:"Versification"},
  {nom:"Rimes embrassées", definition:"Schéma de rimes ABBA.", exemple:"", categorie:"Versification"},
  {nom:"Rime féminine", definition:"Rime se terminant par un e muet (son doux, prolongement).", exemple:"", categorie:"Versification"},
  {nom:"Rime masculine", definition:"Rime ne se terminant pas par un e muet (son net, ferme).", exemple:"", categorie:"Versification"},
  // Rythme et coupes
  {nom:"Césure", definition:"Coupe principale dans l'alexandrin, le divise en deux hémistiches de 6 syllabes (6//6).", exemple:"", categorie:"Versification"},
  {nom:"Hémistiche", definition:"Chacune des deux moitiés de l'alexandrin, séparées par la césure.", exemple:"", categorie:"Versification"},
  {nom:"Enjambement", definition:"La phrase déborde sur le vers suivant, effet de continuité ou fluidité.", exemple:"", categorie:"Versification"},
  {nom:"Rejet", definition:"Un élément bref est rejeté au début du vers suivant, effet de surprise ou mise en valeur.", exemple:"", categorie:"Versification"},
  {nom:"Contre-rejet", definition:"Un élément bref anticipe la phrase du vers suivant, effet d'attente.", exemple:"", categorie:"Versification"},
  {nom:"Trimètre", definition:"Alexandrin coupé en trois mesures de 4 syllabes (4/4/4) – rythme ternaire romantique.", exemple:"", categorie:"Versification"},

  // === FORMES POÉTIQUES ===
  {nom:"Sonnet", definition:"14 vers : 2 quatrains + 2 tercets. Forme noble, apogée à la Renaissance et chez les symbolistes.", exemple:"Du Bellay, Ronsard.", categorie:"Formes poétiques"},
  {nom:"Ballade", definition:"3 strophes + 1 envoi, chaque strophe se termine par un refrain. Forme médiévale.", exemple:"Villon.", categorie:"Formes poétiques"},
  {nom:"Rondeau", definition:"Poème à forme circulaire, avec reprise du premier vers. Forme médiévale.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Ode", definition:"Poème lyrique d'inspiration élevée, souvent en strophes régulières.", exemple:"Ronsard, Hugo.", categorie:"Formes poétiques"},
  {nom:"Fable", definition:"Récit versifié à visée morale. Alternance de vers (hétérométrie).", exemple:"La Fontaine.", categorie:"Formes poétiques"},
  {nom:"Poème en prose", definition:"Texte poétique sans vers ni rime.", exemple:"Baudelaire (Le Spleen de Paris), Rimbaud (Illuminations).", categorie:"Formes poétiques"},
  {nom:"Calligramme", definition:"Poème dont la disposition graphique forme un dessin.", exemple:"Apollinaire.", categorie:"Formes poétiques"},
  // Strophes
  {nom:"Distique", definition:"Strophe de 2 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Tercet", definition:"Strophe de 3 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Quatrain", definition:"Strophe de 4 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Quintil", definition:"Strophe de 5 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Sizain", definition:"Strophe de 6 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Huitain", definition:"Strophe de 8 vers.", exemple:"", categorie:"Formes poétiques"},
  {nom:"Dizain", definition:"Strophe de 10 vers.", exemple:"", categorie:"Formes poétiques"},

  // === SONORITÉS ===
  {nom:"Allitération", definition:"Répétition d'un même son consonantique.", exemple:"Dureté [k][t], douceur [l][m], sifflement [s].", categorie:"Sonorités"},
  {nom:"Assonance", definition:"Répétition d'un même son vocalique.", exemple:"Musicalité, écho intérieur, harmonie.", categorie:"Sonorités"},
  {nom:"Harmonie imitative", definition:"Les sons du vers imitent ce qu'il décrit (onomatopée élargie).", exemple:"« Pour qui sont ces serpents qui sifflent sur vos têtes » (Racine)", categorie:"Sonorités"},
  {nom:"Paronomase", definition:"Rapprochement de mots aux sonorités proches mais au sens différent.", exemple:"« Qui se ressemble s'assemble »", categorie:"Sonorités"},

  // === LEXIQUE D'ANALYSE ===
  {nom:"Champ lexical", definition:"Ensemble de mots se rapportant à un même thème.", exemple:"Champ lexical de la mort, de la nature.", categorie:"Lexique d'analyse"},
  {nom:"Énonciation", definition:"Qui parle ? À qui ? Le je lyrique, le destinataire, le ton adopté.", exemple:"", categorie:"Lexique d'analyse"},
  {nom:"Topos / Motif", definition:"Thème récurrent en poésie.", exemple:"Carpe diem, tempus fugit, locus amoenus, memento mori.", categorie:"Lexique d'analyse"},
  {nom:"Lyrisme", definition:"Expression musicale et subjective des sentiments du poète.", exemple:"", categorie:"Lexique d'analyse"},
  {nom:"Spleen", definition:"Ennui existentiel, dégoût profond (terme baudelairien).", exemple:"Baudelaire.", categorie:"Lexique d'analyse"},
  {nom:"Idéal", definition:"Aspiration vers la beauté, l'absolu, le sublime (opposé du spleen chez Baudelaire).", exemple:"Baudelaire.", categorie:"Lexique d'analyse"},
  {nom:"Poétique", definition:"Art du poète, ensemble de procédés et choix esthétiques propres à un auteur ou mouvement.", exemple:"", categorie:"Lexique d'analyse"},
  {nom:"Hétérométrie", definition:"Alternance de vers de longueurs différentes dans un même poème.", exemple:"", categorie:"Lexique d'analyse"},
  {nom:"Isométrie", definition:"Utilisation de vers de même longueur dans un poème.", exemple:"", categorie:"Lexique d'analyse"},
  {nom:"Blason", definition:"Poème célébrant une partie du corps ou un objet. Genre de la Renaissance.", exemple:"", categorie:"Lexique d'analyse"},

  // === NOMENCLATURE — Chimie organique ===
  // Préfixes des alcanes
  {nom:"méth-", definition:"Préfixe pour 1 carbone", exemple:"méthane : CH₄", categorie:"Nomenclature"},
  {nom:"éth-", definition:"Préfixe pour 2 carbones", exemple:"éthane : C₂H₆", categorie:"Nomenclature"},
  {nom:"prop-", definition:"Préfixe pour 3 carbones", exemple:"propane : C₃H₈", categorie:"Nomenclature"},
  {nom:"but-", definition:"Préfixe pour 4 carbones", exemple:"butane : C₄H₁₀", categorie:"Nomenclature"},
  {nom:"pent-", definition:"Préfixe pour 5 carbones", exemple:"pentane : C₅H₁₂", categorie:"Nomenclature"},
  {nom:"hex-", definition:"Préfixe pour 6 carbones", exemple:"hexane : C₆H₁₄", categorie:"Nomenclature"},
  {nom:"hept-", definition:"Préfixe pour 7 carbones", exemple:"heptane : C₇H₁₆", categorie:"Nomenclature"},
  {nom:"oct-", definition:"Préfixe pour 8 carbones", exemple:"octane : C₈H₁₈", categorie:"Nomenclature"},
  {nom:"non-", definition:"Préfixe pour 9 carbones", exemple:"nonane : C₉H₂₀", categorie:"Nomenclature"},
  {nom:"déc-", definition:"Préfixe pour 10 carbones", exemple:"décane : C₁₀H₂₂", categorie:"Nomenclature"},
  // Familles fonctionnelles
  {nom:"Alcool (suffixe -ol)", definition:"Groupe hydroxyle —OH lié à un carbone. Formule générale : R—OH. Formule brute : CₙH₂ₙ₊₂O", exemple:"méthanol (CH₃—OH), éthanol (CH₃—CH₂—OH), propan-1-ol, propan-2-ol", categorie:"Nomenclature"},
  {nom:"Aldéhyde (suffixe -al)", definition:"Groupe carbonyle C=O en bout de chaîne, le C porte aussi un H. Formule générale : R—CHO. Formule brute : CₙH₂ₙO. Le C fonctionnel est toujours le n°1, donc on ne précise pas sa position", exemple:"méthanal (H—CHO), éthanal (CH₃—CHO), propanal", categorie:"Nomenclature"},
  {nom:"Cétone (suffixe -one)", definition:"Groupe carbonyle C=O à l'intérieur de la chaîne (le C est lié à deux autres C). Formule générale : R—CO—R'. Formule brute : CₙH₂ₙO. On précise la position du C=O", exemple:"propanone (acétone), butanone, pentan-3-one", categorie:"Nomenclature"},
  {nom:"Acide carboxylique (acide ...-oïque)", definition:"Groupe carboxyle —COOH en bout de chaîne (C=O + OH sur le même C). Formule générale : R—COOH. Formule brute : CₙH₂ₙO₂. Le C fonctionnel est toujours le n°1", exemple:"acide méthanoïque, acide éthanoïque (vinaigre), acide propanoïque", categorie:"Nomenclature"},
  // Groupes caractéristiques
  {nom:"Groupe hydroxyle", definition:"—OH. Caractéristique de la famille des alcools", exemple:"Suffixe -ol", categorie:"Nomenclature"},
  {nom:"Groupe carbonyle", definition:"C=O. Présent dans les aldéhydes (bout de chaîne) et les cétones (intérieur de chaîne)", exemple:"Aldéhyde : suffixe -al / Cétone : suffixe -one", categorie:"Nomenclature"},
  {nom:"Groupe carboxyle", definition:"—COOH. Combine C=O et —OH sur le même carbone. Caractéristique des acides carboxyliques", exemple:"Suffixe acide ...-oïque", categorie:"Nomenclature"},
  // Concepts clés
  {nom:"Squelette carboné", definition:"Enchaînement des atomes de carbone dans une molécule organique. Peut être linéaire, ramifié ou cyclique", exemple:"", categorie:"Nomenclature"},
  {nom:"Alcane", definition:"Molécule organique composée uniquement de C et H, avec uniquement des liaisons simples (saturé). Formule brute : CₙH₂ₙ₊₂", exemple:"méthane, éthane, propane, butane…", categorie:"Nomenclature"},
  {nom:"Groupe alkyle", definition:"Fragment d'alcane ayant perdu un H. Suffixe -yle (-yl dans le nom composé)", exemple:"méthyl (—CH₃), éthyl (—C₂H₅), propyl (—C₃H₇)", categorie:"Nomenclature"},
  {nom:"Cycloalcane", definition:"Alcane dont la chaîne se referme en cycle. Préfixe cyclo-. Formule brute : CₙH₂ₙ", exemple:"cyclopentane (C₅H₁₀), cyclohexane (C₆H₁₂)", categorie:"Nomenclature"},
  {nom:"Piège aldéhyde vs cétone", definition:"Les deux ont un C=O mais : aldéhyde = C=O en bout de chaîne (suffixe -al), cétone = C=O au milieu (suffixe -one). Propanal et propanone ont la même formule brute C₃H₆O !", exemple:"propanal (CH₃CH₂CHO) ≠ propanone (CH₃COCH₃)", categorie:"Nomenclature"},
  // Nomenclature des ramifications
  {nom:"Règles de nomenclature", definition:"1) Chaîne la plus longue = nom de base. 2) Numéroter pour que les ramifications aient les plus petits numéros. 3) Nommer les groupes alkyles avec leur position. 4) Préfixes di-, tri-, tétra- si répétition. 5) Ordre alphabétique", exemple:"2-méthylbutane, 2,4-diméthylpentane", categorie:"Nomenclature"},
  // Spectroscopie IR
  {nom:"Spectroscopie IR (principe)", definition:"Technique qui identifie les groupes caractéristiques. Chaque liaison vibre à une fréquence propre et absorbe le rayonnement IR correspondant → pic (creux) sur le spectre", exemple:"Axe X : nombre d'onde σ (cm⁻¹, de 4000 à 400). Axe Y : transmittance T (%)", categorie:"Nomenclature"},
  {nom:"Bande O—H alcool", definition:"Bande large entre 3200–3550 cm⁻¹ (alcool pur/lié). Fine vers 3600 cm⁻¹ (alcool libre/dilué)", exemple:"Plus les liaisons H sont fortes, plus la bande est large et décalée vers les bas nombres d'onde", categorie:"Nomenclature"},
  {nom:"Bande O—H acide carboxylique", definition:"Bande très large de 2500 à 3300 cm⁻¹, recouvre la zone des C—H", exemple:"Liaisons hydrogène très fortes", categorie:"Nomenclature"},
  {nom:"Bande C=O (carbonyle)", definition:"Pic fort et fin entre 1650–1750 cm⁻¹", exemple:"Présent dans aldéhydes, cétones et acides carboxyliques", categorie:"Nomenclature"},
  {nom:"Bande C—H", definition:"Absorption entre 2800–3100 cm⁻¹, moyenne à forte", exemple:"Présente dans toutes les molécules organiques", categorie:"Nomenclature"},
  {nom:"Méthode d'identification IR", definition:"1) Bande O—H large ? → alcool ou acide. 2) Pic C=O vers 1700 ? → carbonyle. 3) O—H large + C=O ? → acide carboxylique. 4) C=O seul → aldéhyde ou cétone. 5) O—H seul → alcool", exemple:"Toujours justifier en citant le nombre d'onde et l'aspect de la bande", categorie:"Nomenclature"},
  {nom:"Zone empreinte digitale", definition:"Zone 1500–400 cm⁻¹. Complexe, propre à chaque molécule. Ne s'interprète pas bande par bande. Sert à confirmer l'identité par comparaison avec un spectre de référence", exemple:"", categorie:"Nomenclature"}
];

var cartes = CARTES.slice();
var index = 0;
var revelee = false;
var modeInverse = false;

var elCarte = document.getElementById("carte");
var elTxt = document.getElementById("carteTxt");
var elCompteur = document.getElementById("compteur");
var elFiltre = document.getElementById("filtre");
var elBtnMode = document.getElementById("btnMode");

function filtrer() {
  var v = elFiltre.value;
  if (v === "Tout") cartes = CARTES.slice();
  else cartes = CARTES.filter(function(c) { return c.categorie === v; });
  index = 0;
  afficher();
}

function afficher() {
  revelee = false;
  elCarte.classList.remove("revelee");
  if (!cartes.length) { elTxt.innerHTML = "Aucune carte."; elCompteur.textContent = ""; return; }
  var c = cartes[index];
  elCompteur.textContent = "Carte " + (index + 1) + " / " + cartes.length + "  —  " + c.categorie;
  if (modeInverse) {
    var h = esc(c.definition);
    if (c.exemple && c.categorie !== "Nomenclature") h += '<div class="petit">Exemple : ' + esc(c.exemple) + '</div>';
    elTxt.innerHTML = h;
  } else {
    var h = '<b>' + esc(c.nom) + '</b>';
    elTxt.innerHTML = h;
  }
}

function reveler() {
  if (!cartes.length || revelee) return;
  revelee = true;
  elCarte.classList.add("revelee");
  var c = cartes[index];
  if (modeInverse) {
    var h = '<b>' + esc(c.nom) + '</b>';
    if (c.siecle) h += ' <span class="petit">(' + esc(c.siecle) + ')</span>';
    elTxt.innerHTML = h;
  } else {
    var h = '';
    if (c.siecle) h += esc(c.siecle) + ' — ';
    h += esc(c.definition);
    if (c.exemple) h += '<div class="petit">Exemple : ' + esc(c.exemple) + '</div>';
    elTxt.innerHTML = h;
  }
}

function suivant() { if (cartes.length) { index = (index + 1) % cartes.length; afficher(); } }
function precedent() { if (cartes.length) { index = (index - 1 + cartes.length) % cartes.length; afficher(); } }
function melanger() {
  for (var i = cartes.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = cartes[i]; cartes[i] = cartes[j]; cartes[j] = t;
  }
  index = 0;
  afficher();
}

function basculerMode() {
  modeInverse = !modeInverse;
  elBtnMode.textContent = modeInverse ? "Mode : Inversé" : "Mode : Normal";
  elBtnMode.classList.toggle("actif", modeInverse);
  afficher();
}

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

elCarte.addEventListener("click", reveler);
elFiltre.addEventListener("change", filtrer);
document.getElementById("btnMode").addEventListener("click", basculerMode);
document.getElementById("btnPrec").addEventListener("click", precedent);
document.getElementById("btnSuiv").addEventListener("click", suivant);
document.getElementById("btnMel").addEventListener("click", melanger);

afficher();
</script>
</body>
</html>
